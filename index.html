<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Rozliczenia</title>

<style>
body{
  background:#0f0f0f;
  color:#dfd1d1b0;
  font-family:Arial;
  padding:20px;
}

h1{
  text-align:center;
}

.form{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:20px;
  justify-content:center;
}

input, button{
  padding:10px;
  border:none;
  border-radius:6px;
}

input{
  background:#1a1a1a;
  color:white;
}

button{
  background:#a33400;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#ff2a2a;
}

table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:10px;
  border:1px solid #333;
  text-align:center;
}

th{
  background:#030169;
}

tr:nth-child(even){
  background:#111;
}

.summary{
  margin-top:20px;
  text-align:center;
  font-size:18px;
}

.raport-miesiac{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.raport-miesiac select{
  background:#1a1a1a;
  color:white;
  padding:10px;
  border-radius:6px;
}

.miesiac{
  background:#1a1a1a;
  cursor:pointer;
  font-weight:bold;
  text-align:left;
}

.miesiac:hover{
  background:#2a2a2a;
}


#szukaj{
  width:100%;
  max-width:300px;
  padding:10px;
  background:#1a1a1a;
  color:white;
  border-radius:6px;
  border:none;
  margin-bottom:20px; /* 👈 TO DODAJ / ZWIĘKSZ */
}

#szukaj:focus{
  outline:none;
  box-shadow:0 0 10px rgba(255,0,0,0.4);
}

.tabela-wrapper{
  width:100%;
  overflow-x:auto;
}

table{
  min-width:600px;
}

@media print{

  body{
    background:white;
    color:black;
  }

  .form,
  button,
  input{
    display:none;
  }

  h1{
    text-align:center;
    margin-bottom:20px;
  }

  table{
    width:100%;
    border:1px solid black;
  }

  th, td{
    border:1px solid black;
    color:black;
  }

.panel{
  margin-top:30px;
  padding:20px;
  background:#151515;
  border-radius:10px;
  box-shadow:0 0 12px rgba(0,0,0,0.6);
}

.panel h3{
  text-align:center;
  margin-bottom:15px;
  color:#4da3ff;
}

.panel-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.panel button,
.import-btn{
  padding:12px;
  background:#1e2a38;
  color:#d6e4ff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  text-align:center;
  transition:0.2s;
}

.panel button:hover,
.import-btn:hover{
  background:#2f4a70;
  transform:scale(1.03);
}

.import-btn input{
  display:none;
}

}
</style>
</head>

<body>

<h1>Rozliczenia</h1>

<div class="form">
  <input type="date" id="data">
  <input type="text" id="opis" placeholder="Opis">
  <input type="number" id="przychod" placeholder="Przychód">
  <input type="number" id="koszt" placeholder="Koszt">
  <button onclick="dodaj()">Dodaj</button>
</div>


<select id="sortowanie" onchange="render()">
  <option value="desc">Najnowsze</option>
  <option value="asc">Najstarsze</option>
</select>

<input type="text" id="szukaj" placeholder="🔍 Szukaj..." oninput="render()">

<div class="tabela-wrapper"></div>
<table>
  <thead>
    <tr>
      <th>Data</th>
      <th>Opis</th>
      <th>Przychód</th>
      <th>Koszt</th>
      <th>Akcje</th>
    </tr>
  </thead>
  <tbody id="tabela"></tbody>
</table>
</div>

<div class="panel">
  <h3>📊 Raporty i dane</h3>

<div class="raport-miesiac">
  <select id="miesiac">
    <option value="">-- wybierz miesiąc --</option>
    <option value="01">Styczeń</option>
    <option value="02">Luty</option>
    <option value="03">Marzec</option>
    <option value="04">Kwiecień</option>
    <option value="05">Maj</option>
    <option value="06">Czerwiec</option>
    <option value="07">Lipiec</option>
    <option value="08">Sierpień</option>
    <option value="09">Wrzesień</option>
    <option value="10">Październik</option>
    <option value="11">Listopad</option>
    <option value="12">Grudzień</option>
  </select>

  
</div>

  <div class="panel-grid">
    <button onclick="drukujMiesiac()">📄 Raport miesięczny</button>
    <button onclick="drukujRok()">📊 Raport roczny</button>
    <button onclick="eksport()">💾 Eksport danych</button>

    <label class="import-btn">
      📥 Import danych
      <input type="file" onchange="importuj(event)">
    </label>
  </div>
</div>

<script>
let dane = JSON.parse(localStorage.getItem("rozliczenia")) || [];

function zapisz(){
  localStorage.setItem("rozliczenia", JSON.stringify(dane));
}

function render(){

  const tryb = document.getElementById("sortowanie")?.value || "desc";

if(tryb === "desc"){
  dane.sort((a, b) => new Date(b.data) - new Date(a.data));
}else{
  dane.sort((a, b) => new Date(a.data) - new Date(b.data));
}

  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  const miesiace = {
    "01":"Styczeń","02":"Luty","03":"Marzec","04":"Kwiecień",
    "05":"Maj","06":"Czerwiec","07":"Lipiec","08":"Sierpień",
    "09":"Wrzesień","10":"Październik","11":"Listopad","12":"Grudzień"
  };

  let sumaPrzychod = 0;
  let sumaKoszt = 0;

  // grupowanie po miesiącach
  let grupy = {};

const szukane = document.getElementById("szukaj")?.value.toLowerCase() || "";

dane.forEach((item, index) => {

  const tekst = (item.opis + " " + item.data).toLowerCase();

  if(!tekst.includes(szukane)) return;

  const miesiac = item.data.split("-")[1];

  if(!grupy[miesiac]){
    grupy[miesiac] = [];
  }

  grupy[miesiac].push({ ...item, index });

  sumaPrzychod += Number(item.przychod);
  sumaKoszt += Number(item.koszt);
});

  // sortowanie miesięcy
  Object.keys(grupy).sort().forEach(miesiac => {

    tabela.innerHTML += `
      <tr class="miesiac" onclick="toggle('${miesiac}')">
        <td colspan="5">📅 ${miesiace[miesiac]}</td>
      </tr>
    `;

    grupy[miesiac].forEach(item => {
      tabela.innerHTML += `
        <tr class="miesiac-${miesiac}">
          <td>${item.data}</td>
          <td>${item.opis}</td>
          <td>${item.przychod}</td>
          <td>${item.koszt}</td>
          <td>
            <button onclick="edytuj(${item.index})">✏️</button>
            <button onclick="usun(${item.index})">🗑️</button>
          </td>
        </tr>
      `;
    });
  });

  document.getElementById("podsumowanie").innerHTML = `
    Przychód: ${sumaPrzychod} zł |
    Koszty: ${sumaKoszt} zł |
    Dochód: ${sumaPrzychod - sumaKoszt} zł
  `;
}

function toggle(miesiac){
  const rows = document.querySelectorAll(`.miesiac-${miesiac}`);

  rows.forEach(row => {
    row.style.display = row.style.display === "none" ? "" : "none";
  });
}

function wyczyscFormularz(){
  document.getElementById("data").value = "";
  document.getElementById("opis").value = "";
  document.getElementById("przychod").value = "";
  document.getElementById("koszt").value = "";
}

function usun(index){
  if(confirm("Usunąć wpis?")){
    dane.splice(index, 1);
    zapisz();
    render();
  }
}

function edytuj(index){

  wyczyscFormularz();

  const item = dane[index];

  document.getElementById("data").value = item.data;
  document.getElementById("opis").value = item.opis;
  document.getElementById("przychod").value = item.przychod;
  document.getElementById("koszt").value = item.koszt;

  dane.splice(index, 1);
  zapisz();
  render();
}

function dodaj(){
  const data = document.getElementById("data").value;
  const opis = document.getElementById("opis").value;
  const przychod = document.getElementById("przychod").value || 0;
  const koszt = document.getElementById("koszt").value || 0;

  if(!data || !opis){
    alert("Uzupełnij dane!");
    return;
  }

  dane.push({ data, opis, przychod, koszt });

wyczyscFormularz();
zapisz();
render();

  document.getElementById("data").value = "";
  document.getElementById("opis").value = "";
  document.getElementById("przychod").value = "";
  document.getElementById("koszt").value = "";
}
render();

function eksport(){
  const dataStr = JSON.stringify(dane, null, 2);

  const blob = new Blob([dataStr], { type: "application/json" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "rozliczenia.json";
  a.click();

  URL.revokeObjectURL(url);
}

function importuj(event){
  const plik = event.target.files[0];

  if(!plik) return;

  const reader = new FileReader();

  reader.onload = function(e){
    try{
      dane = JSON.parse(e.target.result);
      zapisz();
      render();
    } catch {
      alert("Błąd pliku!");
    }
  };

  reader.readAsText(plik);
}

function drukuj(){
  window.print();
}

const today = new Date().toLocaleDateString();
document.getElementById("podsumowanie").innerHTML += "<br>Raport: " + today;

function drukujMiesiac(){
  const miesiac = document.getElementById("miesiac").value;

  if(!miesiac){
    alert("Wybierz miesiąc!");
    return;
  }

  const miesiace = {
    "01":"Styczeń","02":"Luty","03":"Marzec","04":"Kwiecień",
    "05":"Maj","06":"Czerwiec","07":"Lipiec","08":"Sierpień",
    "09":"Wrzesień","10":"Październik","11":"Listopad","12":"Grudzień"
  };

  const rok = new Date().getFullYear();

  const filtrowane = dane.filter(item => {
    return item.data.split("-")[1] === miesiac;
  });

  if(filtrowane.length === 0){
    alert("Brak danych dla tego miesiąca");
    return;
  }

  let sumaPrzychod = 0;
  let sumaKoszt = 0;

  let html = `
    <h2>Raport: ${miesiace[miesiac]} ${rok}</h2>
    <table border="1" style="width:100%; border-collapse:collapse;">
    <tr>
      <th>Data</th>
      <th>Opis</th>
      <th>Przychód</th>
      <th>Koszt</th>
    </tr>
  `;

  filtrowane.forEach(item => {
    sumaPrzychod += Number(item.przychod);
    sumaKoszt += Number(item.koszt);

    html += `
      <tr>
        <td>${item.data}</td>
        <td>${item.opis}</td>
        <td>${item.przychod}</td>
        <td>${item.koszt}</td>
      </tr>
    `;
  });

  html += `
    </table>
    <p><strong>Przychód:</strong> ${sumaPrzychod} zł</p>
    <p><strong>Koszty:</strong> ${sumaKoszt} zł</p>
    <p><strong>Dochód:</strong> ${sumaPrzychod - sumaKoszt} zł</p>
  `;

  const win = window.open("", "", "width=800,height=600");
  win.document.write(html);
  win.document.close();

  // 🔥 automatyczna nazwa pliku
  win.document.title = `Raport_${miesiace[miesiac]}_${rok}`;

  win.print();
}

function drukujRok(){

  if(dane.length === 0){
    alert("Brak danych!");
    return;
  }

  const miesiace = {
    "01":"Styczeń","02":"Luty","03":"Marzec","04":"Kwiecień",
    "05":"Maj","06":"Czerwiec","07":"Lipiec","08":"Sierpień",
    "09":"Wrzesień","10":"Październik","11":"Listopad","12":"Grudzień"
  };

  const rok = new Date().getFullYear();

  let sumaRocznaPrzychod = 0;
  let sumaRocznaKoszt = 0;

  let html = `<h1>Raport roczny ${rok}</h1>`;

  for(let m = 1; m <= 12; m++){

    const miesiac = m.toString().padStart(2, "0");

    const filtrowane = dane.filter(item => {
      return item.data.split("-")[1] === miesiac;
    });

    if(filtrowane.length === 0) continue;

    let sumaPrzychod = 0;
    let sumaKoszt = 0;

    html += `<h2>${miesiace[miesiac]}</h2>`;
    html += `
      <table border="1" style="width:100%; border-collapse:collapse; margin-bottom:20px;">
      <tr>
        <th>Data</th>
        <th>Opis</th>
        <th>Przychód</th>
        <th>Koszt</th>
      </tr>
    `;

    filtrowane.forEach(item => {
      sumaPrzychod += Number(item.przychod);
      sumaKoszt += Number(item.koszt);

      html += `
        <tr>
          <td>${item.data}</td>
          <td>${item.opis}</td>
          <td>${item.przychod}</td>
          <td>${item.koszt}</td>
        </tr>
      `;
    });

    html += `</table>`;

    html += `
      <p><strong>Przychód:</strong> ${sumaPrzychod} zł</p>
      <p><strong>Koszty:</strong> ${sumaKoszt} zł</p>
      <p><strong>Dochód:</strong> ${sumaPrzychod - sumaKoszt} zł</p>
      <hr>
    `;

    sumaRocznaPrzychod += sumaPrzychod;
    sumaRocznaKoszt += sumaKoszt;
  }

  html += `
    <h2>Podsumowanie roczne</h2>
    <p><strong>Przychód:</strong> ${sumaRocznaPrzychod} zł</p>
    <p><strong>Koszty:</strong> ${sumaRocznaKoszt} zł</p>
    <p><strong>Dochód:</strong> ${sumaRocznaPrzychod - sumaRocznaKoszt} zł</p>
  `;

  const win = window.open("", "", "width=900,height=700");
  win.document.write(html);
  win.document.close();

  win.document.title = `Raport_roczny_${rok}`;

  win.print();


  
}

</script>

</body>
</html>
